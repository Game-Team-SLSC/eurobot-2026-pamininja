[env:seed_xiao_esp32s3]
platform = espressif32
board = seed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
lib_deps =
    teemuatlut/TMCStepper@^0.7.1
    madhephaestus/Servo@^1.1.1
    gin66/FastAccelStepper @ ^0.30.9
    
